version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://admin:password@mongodb:27017/
    depends_on:
      - mongodb

  admin-ui:
    build:
      context: ./admin-ui
    ports:
      - "3000:3000"

  verification-portal:
    build:
      context: ./verification-portal
    ports:
      - "3001:3000"

volumes:
  mongodb_data:
